<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBFAF7"/><stop offset="1" stop-color="#F2F1EC"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6FCF7B"/><stop offset="1" stop-color="#3FA34D"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748B"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#3FA34D"/>
    </marker>
    <marker id="arrowO" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E08E2B"/>
    </marker>
    <style>
      .card{stroke:#E2E1DA;stroke-width:1.5;rx:14;filter:drop-shadow(0 2px 3px rgba(0,0,0,.06));}
      .h{font-size:15px;font-weight:700;fill:#1F2937;}
      .s{font-size:12px;fill:#5B6472;}
      .t{font-size:11px;fill:#64748B;}
      .chip{font-size:11px;font-weight:600;}
      .lbl{font-size:11.5px;font-weight:600;fill:#475569;}
    </style>
  </defs>

  <rect x="0" y="0" width="980" height="620" fill="url(#bg)"/>

  <!-- title -->
  <text x="40" y="46" font-size="24" font-weight="800" fill="#1F2937">🌱 Trellis</text>
  <text x="40" y="70" class="s" font-size="13">One brain over your repos · a safe, human-gated build loop · Claude Code / Codex · Obsidian · local-first</text>

  <!-- ============ 1. THE BRAIN (Obsidian) ============ -->
  <rect class="card" x="40" y="100" width="270" height="200" rx="14" fill="#ffffff"/>
  <rect x="40" y="100" width="270" height="34" rx="14" fill="#EDE9FE"/>
  <rect x="40" y="120" width="270" height="14" fill="#EDE9FE"/>
  <text x="58" y="122" class="h" fill="#6D28D9">🧠 The Brain — Obsidian vault</text>
  <text x="58" y="156" class="t">projects/app-a.md   stack · verify · gotchas</text>
  <text x="58" y="176" class="t">projects/api-b.md   decisions + WHY</text>
  <text x="58" y="196" class="t">concepts/auth.md   shared, linked ideas</text>
  <text x="58" y="216" class="t">backlog.md   your tasks</text>
  <text x="58" y="236" class="t">AGENTS.md   the contract</text>
  <!-- mini graph -->
  <circle cx="120" cy="272" r="6" fill="#A78BFA"/><circle cx="170" cy="262" r="6" fill="#7C3AED"/>
  <circle cx="210" cy="282" r="6" fill="#A78BFA"/><circle cx="160" cy="288" r="5" fill="#C4B5FD"/>
  <line x1="120" y1="272" x2="170" y2="262" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="170" y1="262" x2="210" y2="282" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="170" y1="262" x2="160" y2="288" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="230" y="286" class="t" fill="#7C3AED">plain Markdown · a graph, not a DB</text>

  <!-- ============ 2. THE AGENT ============ -->
  <rect class="card" x="360" y="120" width="240" height="160" rx="14" fill="#ffffff"/>
  <text x="380" y="150" class="h" fill="#1D4ED8">🤖 The Agent</text>
  <rect x="380" y="164" width="90" height="24" rx="12" fill="#DBEAFE"/><text x="396" y="180" class="chip" fill="#1D4ED8">Claude Code</text>
  <rect x="478" y="164" width="66" height="24" rx="12" fill="#E5E7EB"/><text x="492" y="180" class="chip" fill="#374151">Codex</text>
  <text x="380" y="212" class="s">Fresh context each run.</text>
  <text x="380" y="230" class="s">Reads the brain + one task,</text>
  <text x="380" y="248" class="s">implements the smallest change,</text>
  <text x="380" y="266" class="s">then stops. AGENTS.md-driven.</text>

  <!-- brain -> agent (context) -->
  <path d="M310 190 C 335 190, 340 190, 358 190" fill="none" stroke="#3FA34D" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="312" y="182" class="lbl" fill="#3FA34D">context</text>

  <!-- ============ 3. YOUR REPOS ============ -->
  <rect class="card" x="650" y="120" width="290" height="160" rx="14" fill="#ffffff"/>
  <text x="670" y="150" class="h">📁 Your repos (untouched)</text>
  <rect x="670" y="166" width="80" height="30" rx="8" fill="#F1F5F9" stroke="#E2E8F0"/><text x="686" y="186" class="t">app-a</text>
  <rect x="760" y="166" width="80" height="30" rx="8" fill="#F1F5F9" stroke="#E2E8F0"/><text x="776" y="186" class="t">api-b</text>
  <rect x="850" y="166" width="80" height="30" rx="8" fill="#F1F5F9" stroke="#E2E8F0"/><text x="866" y="186" class="t">web-c</text>
  <text x="670" y="228" class="s">The loop never edits these directly —</text>
  <text x="670" y="246" class="s">it works in a throwaway git worktree</text>
  <text x="670" y="264" class="s">and opens a PR you merge.</text>

  <!-- agent -> repos (via loop, dotted) -->
  <path d="M600 200 C 625 200, 630 200, 648 200" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- ============ THE LOOP (pipeline) ============ -->
  <rect x="40" y="350" width="900" height="180" rx="16" fill="#ffffff" stroke="#E2E1DA" stroke-width="1.5"/>
  <text x="60" y="382" class="h" fill="#3FA34D">🔁 The Loop — one task → a reviewed PR</text>
  <text x="60" y="402" class="t">safe by default: isolated · verified · adversarially reviewed · human-gated</text>

  <!-- pipeline stages -->
  <g transform="translate(60,420)">
    <!-- stage template -->
    <g>
      <rect x="0" y="0" width="120" height="66" rx="10" fill="url(#green)"/>
      <text x="12" y="26" font-size="12.5" font-weight="700" fill="#fff">1 · Task</text>
      <text x="12" y="46" font-size="10.5" fill="#EAF7EC">from backlog.md</text>
    </g>
    <g transform="translate(140,0)">
      <rect x="0" y="0" width="120" height="66" rx="10" fill="#ffffff" stroke="#CBE7CE" stroke-width="1.5"/>
      <text x="12" y="26" font-size="12.5" font-weight="700" fill="#1F2937">2 · Worktree</text>
      <text x="12" y="46" font-size="10.5" fill="#5B6472">main stays safe</text>
    </g>
    <g transform="translate(280,0)">
      <rect x="0" y="0" width="120" height="66" rx="10" fill="#ffffff" stroke="#CBE7CE" stroke-width="1.5"/>
      <text x="12" y="26" font-size="12.5" font-weight="700" fill="#1F2937">3 · Verify</text>
      <text x="12" y="46" font-size="10.5" fill="#5B6472">your test/build gate</text>
    </g>
    <g transform="translate(420,0)">
      <rect x="0" y="0" width="120" height="66" rx="10" fill="#ffffff" stroke="#CBE7CE" stroke-width="1.5"/>
      <text x="12" y="26" font-size="12.5" font-weight="700" fill="#1F2937">4 · Review</text>
      <text x="12" y="46" font-size="10.5" fill="#5B6472">2nd agent, adversarial</text>
    </g>
    <g transform="translate(560,0)">
      <rect x="0" y="0" width="120" height="66" rx="10" fill="#FFF7ED" stroke="#F5C88B" stroke-width="1.5"/>
      <text x="12" y="26" font-size="12.5" font-weight="700" fill="#B45309">5 · HOLD</text>
      <text x="12" y="46" font-size="10.5" fill="#B45309">your QA · trellis review</text>
    </g>
    <g transform="translate(700,0)">
      <rect x="0" y="0" width="120" height="66" rx="10" fill="url(#green)"/>
      <text x="12" y="26" font-size="12.5" font-weight="700" fill="#fff">6 · PR</text>
      <text x="12" y="46" font-size="10.5" fill="#EAF7EC">you approve → open</text>
    </g>
    <!-- arrows between stages -->
    <g stroke="#94A3B8" stroke-width="1.6" fill="none" marker-end="url(#arrow)">
      <line x1="121" y1="33" x2="138" y2="33"/>
      <line x1="261" y1="33" x2="278" y2="33"/>
      <line x1="401" y1="33" x2="418" y2="33"/>
      <line x1="541" y1="33" x2="558" y2="33"/>
      <line x1="681" y1="33" x2="698" y2="33"/>
    </g>
  </g>

  <!-- brain feeds the loop -->
  <path d="M175 300 C 175 330, 175 335, 175 348" fill="none" stroke="#3FA34D" stroke-width="2" marker-end="url(#arrowG)"/>
  <!-- loop writes learnings back to the brain (the compounding arrow) -->
  <path d="M120 420 C 40 420, 20 360, 20 200 C 20 140, 30 130, 38 128" fill="none" stroke="#E08E2B" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#arrowO)"/>
  <text x="26" y="330" class="lbl" fill="#E08E2B" transform="rotate(-90 26 330)">learnings compound back into the brain</text>

  <!-- footer note -->
  <text x="40" y="574" class="t">Trust tiers gate risky repos · secrets/auth/migrations are never touched · the loop merges nothing — you do.</text>
  <text x="40" y="596" class="t" fill="#94A3B8">Rivet 🤖 (optional) sits on your macOS Dock and glows while the loop works.</text>
</svg>
