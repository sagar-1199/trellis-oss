<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 440" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E1F18"/><stop offset="0.55" stop-color="#0C2230"/><stop offset="1" stop-color="#101826"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.07"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="ob" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B79CF9"/><stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="grn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7BE08A"/><stop offset="1" stop-color="#35A24A"/>
    </linearGradient>
    <radialGradient id="clay" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#EDA98F"/><stop offset="1" stop-color="#CC6B4A"/>
    </radialGradient>
    <marker id="fl" markerWidth="12" markerHeight="12" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5C7A70"/>
    </marker>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .lbl{font-size:20px;font-weight:700;fill:#EAF2EF;}
      .sub{font-size:13.5px;font-weight:500;fill:#8CA69C;}
    </style>
  </defs>

  <rect width="1280" height="440" rx="24" fill="url(#bg)"/>
  <!-- faint dot grid -->
  <g fill="#ffffff" opacity="0.04">
    <circle cx="1120" cy="70" r="2"/><circle cx="1160" cy="70" r="2"/><circle cx="1200" cy="70" r="2"/>
    <circle cx="1120" cy="110" r="2"/><circle cx="1160" cy="110" r="2"/><circle cx="1200" cy="110" r="2"/>
    <circle cx="80" cy="360" r="2"/><circle cx="120" cy="360" r="2"/><circle cx="80" cy="400" r="2"/>
  </g>

  <!-- ===================== TITLE ===================== -->
  <text x="64" y="86" font-size="58" font-weight="800" fill="#F4FAF7">🌱 Trellis</text>
  <text x="66" y="126" font-size="21" font-weight="600" fill="#9FE6AC">One brain over all your code projects — plus a safe, human-gated AI build loop.</text>
  <text x="66" y="154" class="sub" font-size="15">Local-first · agent-agnostic · your context compounds, your main branch stays safe.</text>

  <!-- ===================== FLOW ROW ===================== -->
  <!-- connectors first (under tiles) -->
  <g stroke="#3C5A50" stroke-width="2.5" fill="none" marker-end="url(#fl)" stroke-dasharray="2 7" stroke-linecap="round">
    <line x1="342" y1="300" x2="388" y2="300"/>
    <line x1="642" y1="300" x2="688" y2="300"/>
    <line x1="942" y1="300" x2="988" y2="300"/>
  </g>

  <!-- TILE 1: OBSIDIAN -->
  <g transform="translate(80,214)">
    <rect width="262" height="172" rx="18" fill="url(#tile)" stroke="#ffffff" stroke-opacity="0.08"/>
    <!-- Obsidian gem -->
    <g transform="translate(131,60)" filter="url(#soft)">
      <path d="M0,-40 L34,-10 L22,40 L-22,40 L-34,-10 Z" fill="url(#ob)"/>
      <path d="M0,-40 L34,-10 L6,2 Z" fill="#ffffff" opacity="0.22"/>
      <path d="M0,-40 L6,2 L-34,-10 Z" fill="#ffffff" opacity="0.12"/>
      <path d="M6,2 L22,40 L-22,40 L-16,6 Z" fill="#4C1D95" opacity="0.55"/>
      <path d="M-34,-10 L6,2 L-16,6 L-22,40 Z" fill="#5B21B6" opacity="0.5"/>
      <path d="M0,-40 L34,-10 L22,40 L-22,40 L-34,-10 Z" fill="none" stroke="#2E1065" stroke-width="2"/>
    </g>
    <text x="131" y="132" text-anchor="middle" class="lbl">Obsidian</text>
    <text x="131" y="154" text-anchor="middle" class="sub">your brain (Markdown)</text>
  </g>

  <!-- TILE 2: CLAUDE CODE + CODEX -->
  <g transform="translate(380,214)">
    <rect width="262" height="172" rx="18" fill="url(#tile)" stroke="#ffffff" stroke-opacity="0.08"/>
    <!-- Claude / Anthropic sunburst -->
    <g transform="translate(92,58)" filter="url(#soft)">
      <circle r="40" fill="url(#clay)"/>
      <g stroke="#5E2E1E" stroke-width="5.5" stroke-linecap="round">
        <line x1="0" y1="-24" x2="0" y2="24"/>
        <line x1="-24" y1="0" x2="24" y2="0"/>
        <line x1="-17" y1="-17" x2="17" y2="17"/>
        <line x1="17" y1="-17" x2="-17" y2="17"/>
        <line x1="0" y1="-27" x2="0" y2="-13" transform="rotate(30)"/>
        <line x1="0" y1="-27" x2="0" y2="-13" transform="rotate(-30)"/>
        <line x1="0" y1="-27" x2="0" y2="-13" transform="rotate(60)"/>
        <line x1="0" y1="-27" x2="0" y2="-13" transform="rotate(120)"/>
        <line x1="0" y1="-27" x2="0" y2="-13" transform="rotate(150)"/>
        <line x1="0" y1="-27" x2="0" y2="-13" transform="rotate(-150)"/>
      </g>
    </g>
    <!-- Codex / OpenAI blossom (3 interlocking rings) -->
    <g transform="translate(178,58)" filter="url(#soft)">
      <circle r="40" fill="#0B0B0C"/>
      <g fill="none" stroke="#ffffff" stroke-width="4.2">
        <ellipse rx="9" ry="23" transform="rotate(0)"/>
        <ellipse rx="9" ry="23" transform="rotate(60)"/>
        <ellipse rx="9" ry="23" transform="rotate(120)"/>
      </g>
    </g>
    <text x="131" y="132" text-anchor="middle" class="lbl">Claude Code · Codex</text>
    <text x="131" y="154" text-anchor="middle" class="sub">the agent (either engine)</text>
  </g>

  <!-- TILE 3: THE LOOP -->
  <g transform="translate(680,214)">
    <rect width="262" height="172" rx="18" fill="url(#tile)" stroke="#ffffff" stroke-opacity="0.08"/>
    <!-- circular refresh arrows -->
    <g transform="translate(131,58)" filter="url(#soft)">
      <circle r="40" fill="url(#grn)"/>
      <g fill="none" stroke="#0C3A18" stroke-width="6" stroke-linecap="round">
        <path d="M -18,-6 A 20 20 0 1 1 -20,8"/>
      </g>
      <path d="M -26,-2 L -18,-14 L -8,-4 Z" fill="#0C3A18"/>
      <path d="M -12,12 L -28,14 L -22,-1 Z" fill="#0C3A18"/>
    </g>
    <text x="131" y="132" text-anchor="middle" class="lbl">The Loop</text>
    <text x="131" y="154" text-anchor="middle" class="sub">verify · review · hold</text>
  </g>

  <!-- TILE 4: REVIEWED PR -->
  <g transform="translate(980,214)">
    <rect width="262" height="172" rx="18" fill="url(#tile)" stroke="#ffffff" stroke-opacity="0.08"/>
    <!-- git PR / merge icon -->
    <g transform="translate(131,58)" filter="url(#soft)" stroke="#EAF2EF" stroke-width="6" fill="none" stroke-linecap="round">
      <circle cx="-22" cy="-20" r="9" fill="#101826"/>
      <circle cx="-22" cy="22" r="9" fill="#101826"/>
      <circle cx="22" cy="-20" r="9" fill="#101826"/>
      <line x1="-22" y1="-11" x2="-22" y2="13"/>
      <path d="M22,-11 V4 a10 10 0 0 1 -10,10 H-13"/>
    </g>
    <g transform="translate(131,58)"><circle cx="22" cy="20" r="4" fill="#7BE08A"/></g>
    <text x="131" y="132" text-anchor="middle" class="lbl">Reviewed PR</text>
    <text x="131" y="154" text-anchor="middle" class="sub">you approve → you merge</text>
  </g>
</svg>
